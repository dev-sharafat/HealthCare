services:
  postgres:
    image: postgres:16-alpine
    container_name: healthcare_database
    restart: always
    
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres1234
      POSTGRES_DB: healthcare_db


    ports:
      - "5434:5432"

    volumes:
      - healthcare_data:/var/lib/postgresql/data

volumes:
  healthcare_data: